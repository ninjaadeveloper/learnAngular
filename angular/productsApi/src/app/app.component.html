<table border="1">
  <tr>
    <th>S.No</th>
    <th>Title</th>
    <th>Description</th>
    <th>Price</th>
    <th>Image</th>
  </tr>
  <tr *ngFor="let product of productList; let i = index">
    <td>{{ i + 1 }}</td>
    <td>{{ product.title }}</td>
    <td>{{ product.description }}</td>
    <td>{{ product.price }}</td>
    <td>
      <img
        src="{{ product.images[0] }}"
        alt="Image"
        height="100"
        width="auto"
      />
    </td>
  </tr>
</table>
